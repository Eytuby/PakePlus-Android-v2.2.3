<script>

    // ---------- 🔒 内置知识库 & 系统提示词 (仅源码可见，用户不可修改) ----------
    const SYSTEM_PROMPT = `
你是一名专业的糖尿病伤口评估助手，名为“鉴糖镜”。你的核心知识库已内置如下，请严格基于此知识库并结合用户上传的图片与描述进行专业分析。

【内置知识库——糖尿病伤口Wagner分级及护理】
- 0级：有发生伤口溃疡的危险因素，但目前无溃疡。
- 1级：伤口部表浅溃疡，无感染。
- 2级：较深的溃疡，常合并软组织感染，但无脓肿或骨髓炎。
- 3级：深部溃疡，伴有脓肿或骨髓炎。
- 4级：局限性坏疽。
- 5级：完全坏疽。

【芒果苷敷贴适用性分析规则】
**仅在判断分级等于低于3级时执行该项规则**
- **适用条件**：Wagner 1级、2级、3级伤口在完成专业清创且感染受控的前提下，可考虑配合使用含芒果苷敷贴，以辅助创面愈合。
- **使用频率建议**：
  - 1级浅表溃疡：通常建议每1~2天更换一次，具体根据渗出情况调整。
  - 2级较深溃疡：若渗出较多，初期可每日更换，后期视渗出减少改为每2~3天更换一次。
  - 3级深部溃疡：必须在专业医护人员指导下使用，更换频率根据伤口床状态和敷料饱和程度决定，一般每日或隔日更换，需密切观察有无感染加重迹象。
- **不适用与需就医提示**：Wagner 3级以上（即4级、5级），或任何出现局部严重感染、坏疽、深部脓肿、骨髓炎迹象的伤口，**不可自行使用芒果苷敷贴，必须立即就医处理**。

【护理与建议原则】
- 控制血糖、血压、血脂；局部减压；定期专业清创；合理抗感染；改善循环。
- 提醒患者：任何评估都不能替代专业医生诊断，必须尽快就医。

【回答要求】
1. 若用户提供了伤口图片，请仔细观察创面、颜色、范围、有无感染迹象等，结合Wagner分级给出初步倾向性分级（说明仅为AI参考）。
2. 根据分级结果，明确说明当前伤口是否适合使用含芒果苷敷贴（1-3级可用，并给出推荐更换频率；3级以上明确告知不建议使用并强调就医）。
3. 给出简明实用的综合护理要点，并强调就医必要性。
4. 语言专业、温和、清晰，避免引起恐慌。
5. 若无图片但描述清晰，也请基于知识库给出分析；若信息不足，请追问。

请始终遵循以上知识库，并在结尾附上“以上评估仅供参考，请及时前往内分泌科或创面修复科就诊。”
`.trim();

    // ---------- 全局变量 ----------
    let messages = [];                     // 存储对话 { role, content, image? }
    let currentImageBase64 = null;         // 当前待发送图片 (含 data:image/...;base64)
    let currentImageFileName = '';
    let isLoading = false;

    // DOM 元素
    const chatContainer = document.getElementById('chatContainer');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const uploadBtn = document.getElementById('uploadBtn');
    const imageUpload = document.getElementById('imageUpload');
    const previewArea = document.getElementById('previewArea');
    const imagePreviewContainer = document.getElementById('imagePreviewContainer');
    const previewImg = document.getElementById('previewImg');
    const previewFileName = document.getElementById('previewFileName');
    const removeImageBtn = document.getElementById('removeImageBtn');
    const clearChatBtn = document.getElementById('clearChatBtn');

    // ---------- 初始化欢迎消息 ----------
    function initChat() {
      const welcomeMsg = {
        role: 'assistant',
        content: '🧐 您好，我是鉴糖镜。请描述视部情况或上传视部照片，我将基于Wagner分级知识库为您提供初步评估与护理建议。\n\n⚠️ 本工具仅供辅助参考，不能替代医生诊断。'
      };
      messages = [welcomeMsg];
      renderMessages();
    }

    // 渲染消息列表 (关键修改：助手消息使用marked解析)
    function renderMessages() {
      if (!chatContainer) return;
      let html = '';
      messages.forEach((msg, index) => {
        const isUser = msg.role === 'user';
        const bubbleClass = isUser ? 'user' : 'assistant';
        let contentHtml = '';
        
        if (isUser) {
          // 用户消息：纯文本转义，保留图片
          const text = msg.content || '';
          const escapedText = escapeHtml(text).replace(/\n/g, '<br>');
          if (msg.image) {
            contentHtml = `
              <div class="bubble">
                ${escapedText ? `<div>${escapedText}</div>` : ''}
                <div class="message-image">
                  <img src="${escapeHtml(msg.image)}" alt="上传图片">
                </div>
              </div>
            `;
          } else {
            contentHtml = `<div class="bubble">${escapedText}</div>`;
          }
        } else {
          // 助手消息：使用marked解析Markdown (安全起见，marked默认处理XSS)
          let markdownText = msg.content || '';
          let parsedHtml = '';
          try {
            // 配置marked选项 (可选)
            marked.setOptions({
              breaks: true,     // 支持换行转换为<br>
              gfm: true,        // 支持GitHub风格Markdown
            });
            parsedHtml = marked.parse(markdownText);
          } catch (e) {
            console.warn('Markdown解析失败，回退到纯文本', e);
            parsedHtml = escapeHtml(markdownText).replace(/\n/g, '<br>');
          }
          
          contentHtml = `<div class="bubble">${parsedHtml}</div>`;
        }
        
        html += `<div class="message-row ${bubbleClass}">${contentHtml}</div>`;
      });
      
      // 加载指示器
      if (isLoading) {
        html += `
          <div class="message-row assistant">
            <div class="bubble typing-indicator">
              <span></span><span></span><span></span>
            </div>
          </div>
        `;
      }
      
      chatContainer.innerHTML = html;
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    // 简单转义 (用于用户消息)
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // 添加消息
    function addMessage(role, content, imageBase64 = null) {
      messages.push({ role, content, image: imageBase64 });
      renderMessages();
    }

    // 更新加载状态
    function setLoading(loading) {
      isLoading = loading;
      renderMessages();
      sendBtn.disabled = loading;
      messageInput.disabled = loading;
      uploadBtn.disabled = loading;
      if (loading) {
        messageInput.setAttribute('placeholder', '鉴糖镜思考中...');
      } else {
        messageInput.setAttribute('placeholder', '描述视部情况，或上传图片...');
      }
    }

    function clearImagePreview() {
      currentImageBase64 = null;
      currentImageFileName = '';
      imagePreviewContainer.style.display = 'none';
      previewImg.src = '';
      imageUpload.value = '';
    }

    function setImagePreview(base64, fileName) {
      currentImageBase64 = base64;
      currentImageFileName = fileName || '图片';
      previewImg.src = base64;
      previewFileName.textContent = fileName || '视部图片';
      imagePreviewContainer.style.display = 'flex';
    }

    // ---------- 调用千问API (视觉) ----------
    async function callQwenVision() {
      if (!API_KEY || API_KEY.includes('xxxxxxxx')) {
        alert('❌ 请先在代码中配置有效的 API_KEY (DashScope)');
        return null;
      }

      const apiMessages = [
        { role: 'system', content: SYSTEM_PROMPT }
      ];

      for (const msg of messages) {
        if (msg.role === 'user') {
          if (msg.image) {
            apiMessages.push({
              role: 'user',
              content: [
                { type: 'image_url', image_url: { url: msg.image } },
                { type: 'text', text: msg.content || '请分析这张图片' }
              ]
            });
          } else {
            apiMessages.push({ role: 'user', content: msg.content });
          }
        } else if (msg.role === 'assistant') {
          apiMessages.push({ role: 'assistant', content: msg.content });
        }
      }

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${API_KEY}`
          },
          body: JSON.stringify({
            model: MODEL_NAME,
            messages: apiMessages,
            temperature: 0.3,
            max_tokens: 1200
          })
        });

        if (!response.ok) {
          const errorData = await response.text();
          console.error('API错误:', errorData);
          throw new Error(`API请求失败: ${response.status} ${response.statusText}`);
        }

        const data = await response.json();
        const reply = data.choices?.[0]?.message?.content;
        if (!reply) throw new Error('未获取到有效回复');
        return reply;
      } catch (error) {
        console.error('调用千问API出错:', error);
        throw error;
      }
    }

    // 发送消息主逻辑
    async function handleSendMessage() {
      if (isLoading) return;
      
      const text = messageInput.value.trim();
      if (!text && !currentImageBase64) return;

      if (!API_KEY || API_KEY.startsWith('sk-xxxx')) {
        alert('⚠️ 请打开源码，将 API_KEY 变量替换为你的通义千问API Key (DashScope)');
        return;
      }

      const userContent = text || '';
      addMessage('user', userContent, currentImageBase64);
      
      messageInput.value = '';
      clearImagePreview();
      messageInput.style.height = 'auto';
      
      setLoading(true);

      try {
        const reply = await callQwenVision();
        addMessage('assistant', reply);
      } catch (err) {
        addMessage('assistant', `⚠️ 服务暂时不可用：${err.message}\n\n请稍后重试，或检查API Key/网络。`);
      } finally {
        setLoading(false);
      }
    }

    // ---------- 事件绑定 ----------
    sendBtn.addEventListener('click', handleSendMessage);

    messageInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        handleSendMessage();
      }
    });

    messageInput.addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    });

    uploadBtn.addEventListener('click', () => {
      imageUpload.click();
    });

    imageUpload.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      
      if (!file.type.startsWith('image/')) {
        alert('请选择图片文件');
        return;
      }
      
      const reader = new FileReader();
      reader.onload = (ev) => {
        const base64 = ev.target.result;
        setImagePreview(base64, file.name);
      };
      reader.readAsDataURL(file);
    });

    removeImageBtn.addEventListener('click', () => {
      clearImagePreview();
    });

    clearChatBtn.addEventListener('click', () => {
      if (isLoading) return;
      messages = [];
      const welcomeMsg = {
        role: 'assistant',
        content: '🧐 您好，我是鉴糖镜。请描述视部情况或上传视部照片，我将基于Wagner分级知识库为您提供初步评估与护理建议。\n\n⚠️ 本工具仅供辅助参考，不能替代医生诊断。'
      };
      messages.push(welcomeMsg);
      clearImagePreview();
      messageInput.value = '';
      renderMessages();
    });

    // 启动
    initChat();
    
    if (!API_KEY || API_KEY.includes('xxx')) {
      console.warn('鉴糖镜: 请在源码中设置有效的 API_KEY (第118行附近)');
    }
  })();
</script>
</body>
