    function getFormattedDate() {

          <div class="history-item" data-id="${item.id}">
            <div class="history-title"><i class="far fa-calendar-alt"></i> ${item.title}</div>
            <div class="history-preview">${escapeHtml(preview)}</div>
            <div class="history-actions">
              <button class="load-history-btn" data-id="${item.id}"><i class="fas fa-folder-open"></i> 加载</button>
              <button class="delete-history-btn" data-id="${item.id}"><i class="fas fa-trash-alt"></i> 删除</button>
            </div>
          </div>
        `;
      });
      historyListContainer.innerHTML = html;
      // 绑定事件
      document.querySelectorAll('.load-history-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const id = btn.dataset.id;
          loadConversationById(id);
          closeDrawer();
        });
      });
      document.querySelectorAll('.delete-history-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const id = btn.dataset.id;
          deleteConversationById(id);
        });
      });
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // 临时保存当前对话
    function saveCurrentConversation() {
      if (messages.length === 0 || (messages.length === 1 && messages[0].role === 'assistant')) {
        alert('没有可临时保存的对话内容');
        return;
      }
      const title = getFormattedDate();
      const newRecord = {
        id: Date.now() + '' + Math.floor(Math.random()*1000),
        title: title,
        timestamp: Date.now(),
        messages: JSON.parse(JSON.stringify(messages)) // 深拷贝
      };
      chatHistory.push(newRecord);
      saveHistoryToStorage();
      renderHistoryList();
      // 提示
      alert(`已临时保存：${title}`);
    }

    function loadConversationById(id) {
      const record = chatHistory.find(r => r.id === id);
      if (!record) return;
      messages = JSON.parse(JSON.stringify(record.messages));
      renderMessages();
      clearImagePreview();
      messageInput.value = '';
    }

    function deleteConversationById(id) {
      chatHistory = chatHistory.filter(r => r.id !== id);
      saveHistoryToStorage();
      renderHistoryList();
    }

    function openDrawer() { historyDrawer.classList.add('open'); }
    function closeDrawer() { historyDrawer.classList.remove('open'); }

    // ---------- 聊天渲染与逻辑 ----------
    function initChat() {
      const welcomeMsg = {
        role: 'assistant',
        content: '🧐 您好，我鉴糖镜。请描述伤口情况或上传伤口照片，我将基于Wagner分级知识库为您提供初步评估与护理建议。\n\n⚠️ 本工具仅供辅助参考，不能替代医生诊断。'
      };
      messages = [welcomeMsg];
      renderMessages();
    }

    function renderMessages() {
      if (!chatContainer) return;
      let html = '';
      messages.forEach((msg) => {
        const isUser = msg.role === 'user';
        const bubbleClass = isUser ? 'user' : 'assistant';
        let contentHtml = '';
        if (isUser) {
          const text = msg.content || '';
          const escapedText = escapeHtml(text).replace(/\n/g, '<br>');
          if (msg.image) {
            contentHtml = `
              <div class="bubble">
                ${escapedText ? `<div>${escapedText}</div>` : ''}
                <div class="message-image"><img src="${escapeHtml(msg.image)}" alt="上传图片"></div>
              </div>`;
          } else {
            contentHtml = `<div class="bubble">${escapedText}</div>`;
          }
        } else {
          let markdownText = msg.content || '';
          let parsedHtml = '';
          try {
            marked.setOptions({ breaks: true, gfm: true });
            parsedHtml = marked.parse(markdownText);
          } catch (e) {
            parsedHtml = escapeHtml(markdownText).replace(/\n/g, '<br>');
          }
          contentHtml = `<div class="bubble">${parsedHtml}</div>`;
        }
        html += `<div class="message-row ${bubbleClass}">${contentHtml}</div>`;
      });
      if (isLoading) {
        html += `<div class="message-row assistant"><div class="bubble typing-indicator"><span></span><span></span><span></span></div></div>`;
      }
      chatContainer.innerHTML = html;
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function addMessage(role, content, imageBase64 = null) {
      messages.push({ role, content, image: imageBase64 });
      renderMessages();
    }

    function setLoading(loading) {
      isLoading = loading;
      renderMessages();
      sendBtn.disabled = loading;
      messageInput.disabled = loading;
      uploadBtn.disabled = loading;
      messageInput.placeholder = loading ? '鉴糖镜思考中...' : '描述伤口情况，或上传图片...';
    }

    function clearImagePreview() {
      currentImageBase64 = null;
      currentImageFileName = '';
      imagePreviewContainer.style.display = 'none';
      previewImg.src = '';
      imageUpload.value = '';
    }

    function setImagePreview(base64, fileName) {
      currentImageBase64 = base64;
      currentImageFileName = fileName || '图片';
      previewImg.src = base64;
      previewFileName.textContent = fileName || '伤口图片';
      imagePreviewContainer.style.display = 'flex';
    }

    function isValidApiKey(key) { return /^[\x00-\x7F]+$/.test(key); }

    async function callQwenVision() {
      if (!API_KEY || API_KEY.includes('xxxxxxxx')) { alert('请配置API Key'); return null; }
      if (!isValidApiKey(API_KEY)) { alert('API Key含非法字符'); return null; }

      const apiMessages = [{ role: 'system', content: SYSTEM_PROMPT }];
      for (const msg of messages) {
        if (msg.role === 'user') {
          if (msg.image) {
            apiMessages.push({ role: 'user', content: [
              { type: 'image_url', image_url: { url: msg.image } },
              { type: 'text', text: msg.content || '请分析这张图片' }
            ]});
          } else { apiMessages.push({ role: 'user', content: msg.content }); }
        } else if (msg.role === 'assistant') { apiMessages.push({ role: 'assistant', content: msg.content }); }
      }

      const headers = new Headers();
      headers.append('Content-Type', 'application/json');
      headers.append('Authorization', `Bearer ${API_KEY}`);
      const resp = await fetch(API_URL, {
        method: 'POST', headers,
        body: JSON.stringify({ model: MODEL_NAME, messages: apiMessages, temperature: 0.3, max_tokens: 1200 })
      });
      if (!resp.ok) throw new Error(`API错误 ${resp.status}`);
      const data = await resp.json();
      return data.choices?.[0]?.message?.content || '';
    }

    async function handleSendMessage() {
      if (isLoading) return;
      const text = messageInput.value.trim();
      if (!text && !currentImageBase64) return;
      addMessage('user', text || '', currentImageBase64);
      messageInput.value = '';
      clearImagePreview();
      messageInput.style.height = 'auto';
      setLoading(true);
      try {
        const reply = await callQwenVision();
        addMessage('assistant', reply);
      } catch (err) {
        addMessage('assistant', `⚠️ 服务不可用：${err.message}`);
      } finally { setLoading(false); }
    }

    // 新对话（清空）
    function newConversation() {
      if (isLoading) return;
      messages = [{
        role: 'assistant',
        content: '🧐 您好，我鉴糖镜。请描述伤口情况或上传伤口照片，我将基于Wagner分级知识库为您提供初步评估与护理建议。\n\n⚠️ 本工具仅供辅助参考，不能替代医生诊断。'
      }];
      clearImagePreview();
      messageInput.value = '';
      renderMessages();
    }

    // ---------- 事件绑定 ----------
    sendBtn.addEventListener('click', handleSendMessage);
    messageInput.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSendMessage(); }});
    messageInput.addEventListener('input', function() { this.style.height = 'auto'; this.style.height = Math.min(this.scrollHeight, 110) + 'px'; });
    uploadBtn.addEventListener('click', () => imageUpload.click());
    imageUpload.addEventListener('change', (e) => {
      const file = e.target.files[0]; if (!file) return;
      if (!file.type.startsWith('image/')) { alert('请选择图片'); return; }
      const reader = new FileReader();
      reader.onload = (ev) => setImagePreview(ev.target.result, file.name);
      reader.readAsDataURL(file);
    });
    removeImageBtn.addEventListener('click', clearImagePreview);
    clearChatBtn.addEventListener('click', newConversation);

    // 历史抽屉
    historyBtn.addEventListener('click', (e) => { e.stopPropagation(); openDrawer(); });
    closeDrawerBtn.addEventListener('click', closeDrawer);
    saveCurrentChatBtn.addEventListener('click', () => { saveCurrentConversation(); });

    // 点击抽屉外部关闭（简单处理）
    document.addEventListener('click', (e) => {
      if (!historyDrawer.contains(e.target) && e.target !== historyBtn && !historyBtn.contains(e.target)) {
        closeDrawer();
      }
    });

    // 初始化
    loadHistoryFromStorage();
    initChat();
    if (!API_KEY || API_KEY.includes('xxx')) console.warn('请设置API Key');
  })();
</script>
</body>
</html>
