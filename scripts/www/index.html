    <style>
        :root {
            --deep: #0B2545;
            --mid: #134074;
            --sky: #13678A;
            --light: #5DB7DE;
            --ice: #B8E0F6;
            --pale: #E8F4FD;
            --white: #FFFFFF;
            --text: #0B2545;
            --muted: #5A7184;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; overflow: hidden; font-family: 'Noto Sans SC', sans-serif; }
        body { background: linear-gradient(160deg, #0B2545 0%, #134074 30%, #1A6FA0 60%, #5DB7DE 100%); }

        /* 背景动态光晕 */
        .bg-orb {
            position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.18;
            animation: orbFloat 12s ease-in-out infinite alternate; pointer-events: none; z-index: 0;
        }
        .bg-orb-1 { width: 400px; height: 400px; background: #5DB7DE; top: -100px; right: -80px; animation-delay: 0s; }
        .bg-orb-2 { width: 300px; height: 300px; background: #B8E0F6; bottom: -60px; left: -60px; animation-delay: -4s; }
        .bg-orb-3 { width: 200px; height: 200px; background: #0B2545; top: 40%; left: 50%; animation-delay: -8s; }
        @keyframes orbFloat {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, -40px) scale(1.15); }
        }

        /* 主容器 */
        .app-shell {
            position: relative; z-index: 1; display: flex; flex-direction: column;
            height: 100vh; height: 100dvh; max-width: 860px; margin: 0 auto;
        }
        @media (min-width: 1024px) {
            .app-shell { max-width: 720px; margin-top: 24px; margin-bottom: 24px; height: calc(100dvh - 48px); border-radius: 24px; overflow: hidden; box-shadow: 0 24px 80px rgba(11,37,69,0.4); }
        }

        /* 顶栏 */
        .top-bar {
            background: linear-gradient(135deg, rgba(11,37,69,0.95), rgba(19,64,116,0.92));
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(93,183,222,0.2);
            flex-shrink: 0;
        }

        /* 对话区域 */
        .chat-area {
            flex: 1; overflow-y: auto; overflow-x: hidden;
            background: linear-gradient(180deg, rgba(232,244,253,0.92) 0%, rgba(255,255,255,0.96) 40%, rgba(232,244,253,0.9) 100%);
            scroll-behavior: smooth;
        }
        .chat-area::-webkit-scrollbar { width: 4px; }
        .chat-area::-webkit-scrollbar-thumb { background: rgba(19,64,116,0.2); border-radius: 4px; }

        /* 消息动画 */
        .msg-enter { animation: msgSlideIn 0.35s cubic-bezier(0.22, 0.61, 0.36, 1); }
        @keyframes msgSlideIn {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 用户消息 */
        .msg-user {
            background: linear-gradient(135deg, #134074, #13678A);
            color: #fff; border-radius: 20px 20px 4px 20px;
            box-shadow: 0 4px 16px rgba(19,64,116,0.25);
        }

        /* AI消息 */
        .msg-ai {
            background: rgba(255,255,255,0.95); color: var(--text);
            border-radius: 20px 20px 20px 4px;
            border-left: 3px solid #13678A;
            box-shadow: 0 2px 12px rgba(11,37,69,0.08);
        }
        .msg-ai h1, .msg-ai h2, .msg-ai h3 { font-weight: 700; margin: 0.6em 0 0.3em; color: #134074; }
        .msg-ai h1 { font-size: 1.15em; }
        .msg-ai h2 { font-size: 1.05em; }
        .msg-ai h3 { font-size: 0.95em; }
        .msg-ai p { margin: 0.4em 0; line-height: 1.7; }
        .msg-ai ul, .msg-ai ol { padding-left: 1.4em; margin: 0.4em 0; }
        .msg-ai li { margin: 0.2em 0; line-height: 1.6; }
        .msg-ai strong { color: #0B2545; font-weight: 700; }
        .msg-ai code { background: #E8F4FD; padding: 2px 6px; border-radius: 4px; font-size: 0.9em; }
        .msg-ai blockquote { border-left: 3px solid #5DB7DE; padding-left: 12px; color: #5A7184; margin: 0.6em 0; }

        /* 思考用时标签 */
        .think-timer {
            display: inline-flex; align-items: center; gap: 5px;
            font-size: 11px; color: #5A7184; padding: 3px 10px;
            background: #E8F4FD; border-radius: 20px; margin-bottom: 8px;
            transition: all 0.3s;
        }
        .think-timer.done {
            color: #13678A; background: #D6EAF8;
        }
        .think-timer i { font-size: 10px; }
        @keyframes timerPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .think-timer .timer-icon { animation: timerPulse 1.2s ease-in-out infinite; }
        .think-timer.done .timer-icon { animation: none; }

        /* 图片预览 */
        .img-preview {
            border-radius: 12px; overflow: hidden; position: relative;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .img-preview img { max-width: 200px; max-height: 160px; object-fit: cover; display: block; }
        .img-remove {
            position: absolute; top: 4px; right: 4px; width: 22px; height: 22px;
            background: rgba(0,0,0,0.55); color: #fff; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 11px;
            cursor: pointer; transition: background 0.2s;
        }
        .img-remove:hover { background: rgba(220,38,38,0.8); }

        /* 输入区 */
        .input-area {
            background: linear-gradient(180deg, rgba(255,255,255,0.98), rgba(232,244,253,0.98));
            backdrop-filter: blur(12px); border-top: 1px solid rgba(93,183,222,0.2);
            flex-shrink: 0;
        }
        .input-box {
            background: #fff; border: 2px solid #D6E4F0; border-radius: 16px;
            transition: border-color 0.25s, box-shadow 0.25s;
        }
        .input-box:focus-within {
            border-color: #5DB7DE; box-shadow: 0 0 0 3px rgba(93,183,222,0.2);
        }
        .input-box textarea {
            resize: none; border: none; outline: none; background: transparent;
            font-family: inherit; font-size: 15px; color: var(--text); width: 100%;
            line-height: 1.5; padding: 0;
        }
        .input-box textarea::placeholder { color: #A0B4C8; }

        .btn-send {
            background: linear-gradient(135deg, #134074, #13678A, #5DB7DE);
            background-size: 200% 200%; animation: gradShift 4s ease infinite;
            color: #fff; border: none; border-radius: 12px; cursor: pointer;
            transition: transform 0.15s, box-shadow 0.2s;
        }
        .btn-send:hover { transform: scale(1.05); box-shadow: 0 4px 16px rgba(19,64,116,0.35); }
        .btn-send:active { transform: scale(0.96); }
        .btn-send:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }
        @keyframes gradShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .btn-icon {
            width: 38px; height: 38px; border-radius: 10px; border: none;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s; font-size: 16px; background: #E8F4FD; color: #134074;
        }
        .btn-icon:hover { background: #D6EAF8; transform: scale(1.08); }
        .btn-icon:active { transform: scale(0.95); }

        /* 欢迎卡片 */
        .welcome-card {
            background: rgba(255,255,255,0.9); backdrop-filter: blur(12px);
            border-radius: 20px; border: 1px solid rgba(93,183,222,0.25);
            box-shadow: 0 8px 32px rgba(11,37,69,0.1);
        }

        /* 加载动画 */
        .typing-dots span {
            display: inline-block; width: 7px; height: 7px; background: #13678A;
            border-radius: 50%; margin: 0 2px;
            animation: dotPulse 1.4s infinite ease-in-out;
        }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dotPulse {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* Toast */
        .toast {
            position: fixed; top: 24px; left: 50%; transform: translateX(-50%) translateY(-100px);
            background: linear-gradient(135deg, #134074, #13678A); color: #fff;
            padding: 12px 24px; border-radius: 12px; font-size: 14px; z-index: 9999;
            box-shadow: 0 8px 24px rgba(11,37,69,0.3);
            transition: transform 0.4s cubic-bezier(0.22, 0.61, 0.36, 1);
        }
        .toast.show { transform: translateX(-50%) translateY(0); }

        /* 诊断徽标 */
        .badge-glow {
            background: linear-gradient(135deg, #0B2545, #13678A);
            box-shadow: 0 0 20px rgba(93,183,222,0.4);
        }

        /* 隐藏文件输入 */
        .file-hidden { position: absolute; width: 0; height: 0; opacity: 0; overflow: hidden; }

        /* 减少动画偏好 */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
        }

        /* 响应式微调 */
        @media (max-width: 640px) {
            .msg-user, .msg-ai { max-width: 88% !important; }
        }
    </style>
</head>

                '- 如果图片非伤口相关，礼貌引导用户上传糖尿病伤口图片',

                '- 若用户仅文字提问无图片，基于常见糖尿病伤口知识进行解答，并建议上传图片获取更精准分析'
            ].join('\n');
        }

        // 获取API Key
        function _getApiKey() {
            if (_0k) return _0k;
            if (_0s) return _dk(_0s);
            return 'cd7153c14e204890ad65cf18cfbd8c2c.EEupffFrT2XmRajA';
        }

        /* ========== 应用状态 ========== */
        const API_URL = 'https://open.bigmodel.cn/api/paas/v4/chat/completions';
        const MODEL = 'glm-5v-turbo';  // 如需使用其他模型可修改

        let conversationHistory = [];  // 对话历史（发给API用）
        let pendingImages = [];        // 待发送图片（base64数组）
        let isGenerating = false;      // 是否正在生成回复
        let requestStartTime = 0;      // 请求开始时间戳

        /* ========== DOM引用 ========== */
        const chatArea = document.getElementById('chatArea');
        const msgList = document.getElementById('msgList');
        const welcomeCard = document.getElementById('welcomeCard');
        const inputText = document.getElementById('inputText');
        const btnSend = document.getElementById('btnSend');
        const btnUpload = document.getElementById('btnUpload');
        const btnClear = document.getElementById('btnClear');
        const fileInput = document.getElementById('fileInput');
        const previewBar = document.getElementById('previewBar');
        const toastEl = document.getElementById('toast');

        /* ========== 工具函数 ========== */

        // 显示Toast提示
        let toastTimer = null;
        function showToast(msg, duration = 3000) {
            toastEl.textContent = msg;
            toastEl.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => toastEl.classList.remove('show'), duration);
        }

        // 压缩图片
        function compressImage(file, maxSize = 1600, quality = 0.8) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onerror = () => reject(new Error('读取图片失败'));
                reader.onload = (e) => {
                    const img = new Image();
                    img.onerror = () => reject(new Error('加载图片失败'));
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let w = img.width, h = img.height;
                        if (w > maxSize || h > maxSize) {
                            if (w > h) { h = Math.round(h * maxSize / w); w = maxSize; }
                            else { w = Math.round(w * maxSize / h); h = maxSize; }
                        }
                        canvas.width = Math.max(1, w);
                        canvas.height = Math.max(1, h);
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        resolve(canvas.toDataURL('image/jpeg', quality));
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        // 滚动到底部
        function scrollToBottom() {
            requestAnimationFrame(() => {
                chatArea.scrollTop = chatArea.scrollHeight;
            });
        }

        // 自动调整textarea高度
        function autoResize() {
            inputText.style.height = 'auto';
            inputText.style.height = Math.min(inputText.scrollHeight, 120) + 'px';
        }

        // 更新发送按钮状态
        function updateSendBtn() {
            const hasContent = inputText.value.trim() || pendingImages.length > 0;
            btnSend.disabled = !hasContent || isGenerating;
        }

        // 配置marked
        marked.setOptions({ breaks: true, gfm: true });

        /* ========== 图片管理 ========== */

        async function addImage(file) {
            if (!file || !file.type.startsWith('image/')) {
                showToast('请选择图片文件');
                return;
            }
            if (file.size > 20 * 1024 * 1024) {
                showToast('图片大小不能超过20MB');
                return;
            }
            if (pendingImages.length >= 3) {
                showToast('最多同时上传3张图片');
                return;
            }
            try {
                const base64 = await compressImage(file);
                pendingImages.push(base64);
                renderPreviews();
                updateSendBtn();
            } catch (err) {
                showToast('图片处理失败，请重试');
            }
        }

        function removeImage(index) {
            pendingImages.splice(index, 1);
            renderPreviews();
            updateSendBtn();
        }

        function renderPreviews() {
            if (pendingImages.length === 0) {
                previewBar.classList.add('hidden');
                previewBar.innerHTML = '';
                return;
            }
            previewBar.classList.remove('hidden');
            previewBar.innerHTML = pendingImages.map((src, i) => `
                <div class="img-preview">
                    <img src="${src}" alt="待发送图片${i + 1}">
                    <div class="img-remove" onclick="window._removeImg(${i})" title="移除" aria-label="移除图片">
                        <i class="fa-solid fa-xmark"></i>
                    </div>
                </div>
            `).join('');
        }
        window._removeImg = removeImage;

        /* ========== 消息渲染 ========== */

        function appendUserMessage(text, images) {
            if (welcomeCard) welcomeCard.style.display = 'none';

            const div = document.createElement('div');
            div.className = 'flex justify-end mb-3 sm:mb-4 msg-enter';

            let html = '';
            if (images && images.length > 0) {
                html += `<div class="flex flex-wrap gap-1.5 mb-2 justify-end">`;
                images.forEach(src => {
                    html += `<img src="${src}" class="w-28 h-20 sm:w-36 sm:h-24 object-cover rounded-xl" alt="用户上传的伤口图片">`;
                });
                html += `</div>`;
            }
            if (text.trim()) {
                html += `<div class="msg-user px-4 py-2.5 sm:px-5 sm:py-3 max-w-[80%] text-sm sm:text-[15px] leading-relaxed">${escapeHtml(text)}</div>`;
            }

            div.innerHTML = html;
            msgList.appendChild(div);
            scrollToBottom();
        }

        // 添加AI消息占位（含思考计时标签）
        function appendAIMessage() {
            const wrapper = document.createElement('div');
            wrapper.className = 'flex justify-start mb-3 sm:mb-4 msg-enter';

            const bubble = document.createElement('div');
            bubble.className = 'msg-ai px-4 py-3 sm:px-5 sm:py-4 max-w-[85%] sm:max-w-[75%] text-sm sm:text-[15px] leading-relaxed';

            // 思考计时标签
            const timerTag = document.createElement('div');
            timerTag.className = 'think-timer';
            timerTag.innerHTML = '<i class="fa-solid fa-brain timer-icon"></i><span class="timer-text">思考中...</span>';
            bubble.appendChild(timerTag);

            // 加载动画
            const loadingEl = document.createElement('div');
            loadingEl.className = 'typing-dots';
            loadingEl.innerHTML = '<span></span><span></span><span></span>';
            bubble.appendChild(loadingEl);

            wrapper.appendChild(bubble);
            msgList.appendChild(wrapper);
            scrollToBottom();

            return { bubble, timerTag, loadingEl };
        }

        // 更新思考用时标签
        function updateThinkTimer(timerTag, elapsedMs, done) {
            const seconds = (elapsedMs / 1000).toFixed(1);
            if (done) {
                timerTag.classList.add('done');
                timerTag.innerHTML = `<i class="fa-solid fa-check-circle timer-icon"></i><span class="timer-text">思考用时 ${seconds}s</span>`;
            } else {
                timerTag.querySelector('.timer-text').textContent = `思考中 ${seconds}s`;
            }
        }

        // 渲染Markdown内容到AI气泡
        function renderAIContent(bubble, content, timerTag) {
            // 保留思考用时标签，渲染正文内容
            const existingContent = bubble.querySelector('.ai-main-content');
            if (existingContent) {
                existingContent.innerHTML = marked.parse(content);
            } else {
                const mainDiv = document.createElement('div');
                mainDiv.className = 'ai-main-content';
                mainDiv.innerHTML = marked.parse(content);
                bubble.appendChild(mainDiv);
            }
            scrollToBottom();
        }

        // 转义HTML
        function escapeHtml(str) {
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }

        /* ========== API调用 ========== */

        async function sendToAPI(userText, images, timerTag, loadingEl) {
            const apiKey = _getApiKey();
            if (!apiKey) {
                showToast('API Key未配置，请联系管理员');
                return '系统配置错误，无法发送请求。请联系管理员配置API Key。';
            }

            // 构建用户消息内容
            const content = [];
            if (images && images.length > 0) {
                images.forEach(src => {
                    content.push({
                        type: 'image_url',
                        image_url: { url: src }
                    });
                });
            }
            if (userText.trim()) {
                content.push({ type: 'text', text: userText });
            } else if (images && images.length > 0) {
                content.push({ type: 'text', text: '请仔细观察这张伤口图片，进行辨证分析并给出含芒果苷敷贴的使用建议。' });
            }

            // 构建消息历史
            const messages = [
                { role: 'system', content: _getSystemPrompt() },
                ...conversationHistory,
                { role: 'user', content: content }
            ];

            // 记录请求开始时间
            requestStartTime = performance.now();
            let firstTokenReceived = false;

            // 启动计时器实时更新
            const timerInterval = setInterval(() => {
                if (!firstTokenReceived) {
                    const elapsed = performance.now() - requestStartTime;
                    updateThinkTimer(timerTag, elapsed, false);
                }
            }, 100);

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: MODEL,
                        messages: messages,
                        stream: true,
                        temperature: 0.7,
                        top_p: 0.9
                    })
                });

                if (!response.ok) {
                    const errData = await response.json().catch(() => ({}));
                    const errMsg = errData.error?.message || `请求失败 (${response.status})`;
                    throw new Error(errMsg);
                }

                // 流式读取
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullContent = '';
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop() || '';

                    for (const line of lines) {
                        const trimmed = line.trim();
                        if (!trimmed || !trimmed.startsWith('data:')) continue;
                        const data = trimmed.slice(5).trim();
                        if (data === '[DONE]') continue;

                        try {
                            const json = JSON.parse(data);
                            const delta = json.choices?.[0]?.delta?.content;
                            if (delta) {
                                // 收到第一个token
                                if (!firstTokenReceived) {
                                    firstTokenReceived = true;
                                    clearInterval(timerInterval);
                                    const thinkTime = performance.now() - requestStartTime;
                                    updateThinkTimer(timerTag, thinkTime, true);
                                    // 移除加载动画
                                    if (loadingEl && loadingEl.parentNode) {
                                        loadingEl.parentNode.removeChild(loadingEl);
                                    }
                                }
                                fullContent += delta;
                                renderAIContent(currentAIBubble, fullContent, timerTag);
                            }
                        } catch (e) {
                            // 忽略解析错误
                        }
                    }
                }

                // 如果全程没收到token（空回复等情况）
                if (!firstTokenReceived) {
                    clearInterval(timerInterval);
                    const thinkTime = performance.now() - requestStartTime;
                    updateThinkTimer(timerTag, thinkTime, true);
                    if (loadingEl && loadingEl.parentNode) {
                        loadingEl.parentNode.removeChild(loadingEl);
                    }
                }

                return fullContent;

            } catch (err) {
                clearInterval(timerInterval);
                const thinkTime = performance.now() - requestStartTime;
                updateThinkTimer(timerTag, thinkTime, true);
                if (loadingEl && loadingEl.parentNode) {
                    loadingEl.parentNode.removeChild(loadingEl);
                }
                console.error('API调用错误:', err);
                return `抱歉，分析过程中出现错误：${err.message}。请稍后重试。`;
            }
        }

        /* ========== 核心交互逻辑 ========== */

        let currentAIBubble = null;

        // 发送消息
        async function sendMessage() {
            const text = inputText.value.trim();
            const images = [...pendingImages];

            if (!text && images.length === 0) return;
            if (isGenerating) return;

            // 清空输入
            inputText.value = '';
            pendingImages = [];
            renderPreviews();
            autoResize();
            isGenerating = true;
            updateSendBtn();

            // 显示用户消息
            appendUserMessage(text, images);

            // 记录到对话历史
            const userContent = [];
            if (images.length > 0) {
                images.forEach(src => {
                    userContent.push({ type: 'image_url', image_url: { url: src } });
                });
            }
            if (text) {
                userContent.push({ type: 'text', text: text });
            } else {
                userContent.push({ type: 'text', text: '请仔细观察这张伤口图片，进行辨证分析并给出含芒果苷敷贴的使用建议。' });
            }
            conversationHistory.push({ role: 'user', content: userContent });

            // 创建AI气泡（含思考计时标签）
            const { bubble, timerTag, loadingEl } = appendAIMessage();
            currentAIBubble = bubble;

            // 调用API
            const aiReply = await sendToAPI(text, images, timerTag, loadingEl);

            // 记录AI回复到历史
            conversationHistory.push({ role: 'assistant', content: aiReply });

            // 最终渲染（确保完整）
            renderAIContent(currentAIBubble, aiReply, timerTag);

            isGenerating = false;
            updateSendBtn();
            currentAIBubble = null;
        }

        // 清空对话
        function clearChat() {
            conversationHistory = [];
            pendingImages = [];
            renderPreviews();
            msgList.innerHTML = '';
            if (welcomeCard) welcomeCard.style.display = '';
            showToast('对话已清空');
        }

        /* ========== 事件绑定 ========== */

        btnSend.addEventListener('click', sendMessage);

        inputText.addEventListener('input', () => {
            autoResize();
            updateSendBtn();
        });
        inputText.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                if (!btnSend.disabled) sendMessage();
            }
        });

        btnUpload.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => {
            const files = e.target.files;
            if (files) {
                Array.from(files).forEach(f => addImage(f));
            }
            fileInput.value = '';
        });

        const inputArea = document.querySelector('.input-area');
        inputArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            e.stopPropagation();
        });
        inputArea.addEventListener('drop', (e) => {
            e.preventDefault();
            e.stopPropagation();
            const files = e.dataTransfer.files;
            if (files) {
                Array.from(files).forEach(f => {
                    if (f.type.startsWith('image/')) addImage(f);
                });
            }
        });

        btnClear.addEventListener('click', clearChat);

        updateSendBtn();

        if (!_getApiKey()) {
            setTimeout(() => {
                showToast('提示：API Key未配置，请在代码中设置', 5000);
            }, 1500);
        }

    })();
    </script>
</body>
</html>
